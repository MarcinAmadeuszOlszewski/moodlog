<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Twój dziennik | MoodLog</title>
	<link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body>
	<main>
		<h1>Twój prywatny dziennik</h1>
		<p th:text="'Zalogowano jako ' + ${userEmail} + '.'"></p>
		<p>To jest bezpieczna przestrzeń na Twoje wpisy. Zacznij od pierwszego wpisu, gdy ta funkcja będzie gotowa.</p>
		<section aria-labelledby="journal-empty-state-heading">
			<h2 id="journal-empty-state-heading">Jeszcze nie masz wpisów</h2>
			<p th:text="${firstEntryHint}"></p>
			<button type="button" disabled aria-disabled="true" th:text="${firstEntryCallToAction + ' (wkrótce)'}"></button>
		</section>

		<form method="post" th:action="@{/logout}">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button type="submit">Wyloguj się</button>
		</form>

		<p><a th:href="@{/}">Wróć na stronę główną</a></p>
	</main>
</body>
</html>
