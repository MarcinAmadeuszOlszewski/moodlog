<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Trendy nastroju | MoodLog</title>
	<link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body>
	<main>
		<h1>Trendy nastroju</h1>
		<p>Zalogowano jako: <strong th:text="${userEmail}">user@example.com</strong>.</p>
		<nav>
			<p>
				<a th:href="@{/journal}">Dziennik</a>
				•
				<a th:href="@{/journal/history}">Historia wpisów</a>
				•
				<strong>Trendy nastroju</strong>
			</p>
		</nav>
		<p>Ten ekran jest przygotowany pod kolejny krok wdrożenia.</p>
		<p>Na razie możesz wrócić do dziennika albo przejrzeć historię wpisów bez trafiania na martwy link.</p>

		<form method="post" th:action="@{/logout}">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button type="submit">Wyloguj się</button>
		</form>

		<p><a th:href="@{/}">Wróć na stronę główną</a></p>
	</main>
</body>
</html>
