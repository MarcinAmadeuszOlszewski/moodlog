<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodLog</title>
</head>
<body>
<main>
    <p>
        Witaj! Jesteś dziś <span id="guest-number" th:text="'...'">...</span> gościem! Bravo!
    </p>
    <p>
        <a th:href="@{/login}">Zaloguj się</a>
        lub
        <a th:href="@{/register}">załóż konto</a>,
        aby przejść do prywatnego dziennika.
    </p>
</main>

<script th:inline="javascript">
    const randomEndpoint = /*[[ @{/v1/random} ]]*/ "/v1/random";
    const guestNumberElement = document.getElementById("guest-number");

    fetch(randomEndpoint)
        .then((response) => {
            if (!response.ok) {
                throw new Error("Failed to load random number");
            }
            return response.json();
        })
        .then((guestNumber) => {
            guestNumberElement.textContent = guestNumber;
        })
        .catch(() => {
            guestNumberElement.textContent = "?";
        });
</script>
</body>
</html>
