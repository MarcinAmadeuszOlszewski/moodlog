spring.application.name=mood-log
server.port=${PORT:8080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.session.cookie.name=${MOODLOG_SESSION_COOKIE_NAME:MOODLOGSESSION}
server.servlet.session.timeout=${MOODLOG_SESSION_TIMEOUT:30m}
spring.datasource.url=${MOODLOG_DATABASE_URL:jdbc:h2:file:./data/moodlog;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${MOODLOG_DATABASE_USERNAME:sa}
spring.datasource.password=${MOODLOG_DATABASE_PASSWORD:}
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
moodlog.auth.password.min-length=${MOODLOG_AUTH_PASSWORD_MIN_LENGTH:6}
logging.level.com.amadeuszx.moodlog=INFO
spring.ai.model.chat=${SPRING_AI_CHAT_MODEL:none}
spring.ai.openai.api-key=${OPENAI_API_KEY:disabled}
spring.ai.openai.timeout=${moodlog.ai.timeout}
spring.ai.openai.chat.options.model=${moodlog.ai.default-model}
moodlog.ai.enabled=${MOODLOG_AI_ENABLED:false}
moodlog.ai.provider=${MOODLOG_AI_PROVIDER:stub}
moodlog.ai.default-model=${MOODLOG_AI_DEFAULT_MODEL:gpt-4o-mini}
moodlog.ai.timeout=${MOODLOG_AI_TIMEOUT:5s}
moodlog.journal.recent-list-limit=${MOODLOG_JOURNAL_RECENT_LIST_LIMIT:10}
moodlog.journal.max-content-length=${MOODLOG_JOURNAL_MAX_CONTENT_LENGTH:2000}
