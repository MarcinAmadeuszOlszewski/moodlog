spring.application.name=mood-log
server.port=${PORT:8080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.session.cookie.name=${MOODLOG_SESSION_COOKIE_NAME:MOODLOGSESSION}
server.servlet.session.timeout=${MOODLOG_SESSION_TIMEOUT:30m}
spring.datasource.url=${MOODLOG_DATABASE_URL}
spring.datasource.username=${MOODLOG_DATABASE_USERNAME}
spring.datasource.password=${MOODLOG_DATABASE_PASSWORD}
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.mvc.hiddenmethod.filter.enabled=true
server.error.include-stacktrace=never
server.error.include-message=never
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
moodlog.auth.password.min-length=${MOODLOG_AUTH_PASSWORD_MIN_LENGTH:6}
logging.level.com.amadeuszx.moodlog=INFO
spring.ai.model.chat=${SPRING_AI_CHAT_MODEL:openai}
spring.ai.openai.api-key=${OPENAI_API_KEY:lm-studio}
spring.ai.openai.base-url=${OPENAI_BASE_URL:http://localhost:1234/v1}
spring.ai.openai.timeout=${moodlog.ai.timeout}
spring.ai.openai.chat.options.model=${moodlog.ai.default-model}
moodlog.ai.enabled=${MOODLOG_AI_ENABLED:true}
moodlog.ai.provider=${MOODLOG_AI_PROVIDER:openai}
moodlog.ai.default-model=${MOODLOG_AI_DEFAULT_MODEL:qwen2.5-7b-instruct-1m}
moodlog.ai.timeout=${MOODLOG_AI_TIMEOUT:20s}
moodlog.ai.response-format-type=${MOODLOG_AI_RESPONSE_FORMAT_TYPE:none}
moodlog.journal.recent-list-limit=${MOODLOG_JOURNAL_RECENT_LIST_LIMIT:10}
moodlog.journal.max-content-length=${MOODLOG_JOURNAL_MAX_CONTENT_LENGTH:2000}
moodlog.journal.history-page-size=${MOODLOG_JOURNAL_HISTORY_PAGE_SIZE:20}
moodlog.journal.weekly-trend-span=${MOODLOG_JOURNAL_WEEKLY_TREND_SPAN:8}
