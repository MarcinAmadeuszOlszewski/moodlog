spring.datasource.url=jdbc:h2:mem:moodlog-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
moodlog.auth.password.min-length=6
logging.level.com.amadeuszx.moodlog=INFO
spring.ai.model.chat=none
spring.ai.openai.api-key=disabled
spring.ai.openai.chat.options.model=gpt-4o-mini
moodlog.ai.enabled=false
moodlog.ai.provider=stub
moodlog.ai.default-model=gpt-4o-mini
moodlog.ai.timeout=1s
moodlog.journal.recent-list-limit=10
moodlog.journal.max-content-length=2000
